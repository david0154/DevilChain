name: DevilChain CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  rust-core:
    name: Build & Test Blockchain Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('core/Cargo.toml') }}
      - name: Build Core
        working-directory: core
        run: cargo build --release
      - name: Test Core
        working-directory: core
        run: cargo test

  contracts:
    name: Compile Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        working-directory: contracts
        run: npm install
      - name: Compile
        working-directory: contracts
        run: npx hardhat compile

  explorer:
    name: Build DevilScan Explorer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        working-directory: explorer
        run: npm install
      - name: Build
        working-directory: explorer
        run: npm run build

  security-audit:
    name: Rust Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - name: Audit
        working-directory: core
        run: cargo audit
