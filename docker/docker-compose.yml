version: '3.9'

# DevilChain Network - Ultra Low Resource Docker Stack
# Optimized for: 2 CPU / 2GB RAM VPS minimum
# Developed by Nexuzy Lab (nexuzy.tech) | Powered by Devil One (devilone.in)

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "5m"
      max-file: "2"

services:

  # ── CORE NODE ──────────────────────────────────────────────
  devilchain-node:
    <<: *common
    build:
      context: ../core
      dockerfile: Dockerfile
    container_name: devilchain_node
    ports:
      - "8545:8545"
      - "8546:8546"
    environment:
      - RUST_LOG=warn
      - DEVIL_MODE=testnet
      - DEVIL_DB_PATH=/data/chain
      - DEVIL_PORT=8545
      - DEVIL_GRAPHQL_PORT=8546
      - DEVIL_BLOCK_TIME=3
      - DEVIL_MAX_TX_POOL=500
    volumes:
      - chain_data:/data/chain
    deploy:
      resources:
        limits:
          cpus: '0.6'
          memory: 400M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545/api/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [devilnet]

  # ── AI GUARD ───────────────────────────────────────────────
  devilguard-ai:
    <<: *common
    build:
      context: ../ai
      dockerfile: Dockerfile
    container_name: devilguard_ai
    ports:
      - "8547:8547"
    environment:
      - PORT=8547
      - WORKERS=1
      - LOG_LEVEL=warning
      - MODEL_LITE=true
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 200M
        reservations:
          cpus: '0.05'
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8547/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      devilchain-node:
        condition: service_healthy
    networks: [devilnet]

  # ── STORAGE ────────────────────────────────────────────────
  devilstorage:
    <<: *common
    build:
      context: ../storage
      dockerfile: Dockerfile
    container_name: devilstorage
    ports:
      - "8548:8548"
    environment:
      - PORT=8548
      - STORAGE_PATH=/data/storage
      - MAX_FILE_SIZE_MB=10
    volumes:
      - storage_data:/data/storage
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 100M
        reservations:
          cpus: '0.05'
          memory: 32M
    depends_on:
      devilchain-node:
        condition: service_healthy
    networks: [devilnet]

  # ── BRIDGE ─────────────────────────────────────────────────
  devilbridge:
    <<: *common
    build:
      context: ../bridge
      dockerfile: Dockerfile
    container_name: devilbridge
    ports:
      - "8549:8549"
    environment:
      - PORT=8549
      - NODE_API=http://devilchain-node:8545
      - LOG_LEVEL=warning
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 80M
        reservations:
          cpus: '0.05'
          memory: 32M
    depends_on:
      devilchain-node:
        condition: service_healthy
    networks: [devilnet]

  # ── EXPLORER ───────────────────────────────────────────────
  devilscan:
    <<: *common
    build:
      context: ../explorer
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8545
    container_name: devilscan
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://devilchain-node:8545
      - NEXT_TELEMETRY_DISABLED=1
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 150M
        reservations:
          cpus: '0.05'
          memory: 64M
    depends_on:
      devilchain-node:
        condition: service_healthy
    networks: [devilnet]

  # ── SOCIAL ─────────────────────────────────────────────────
  devilsocial:
    <<: *common
    build:
      context: ../social
      dockerfile: Dockerfile
    container_name: devilsocial
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://devilchain-node:8545
      - NEXT_TELEMETRY_DISABLED=1
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 100M
        reservations:
          cpus: '0.05'
          memory: 32M
    depends_on:
      devilchain-node:
        condition: service_healthy
    networks: [devilnet]

  # ── CHAT ───────────────────────────────────────────────────
  devilchat:
    <<: *common
    build:
      context: ../chat
      dockerfile: Dockerfile
    container_name: devilchat
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://devilchain-node:8545
      - NEXT_TELEMETRY_DISABLED=1
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 100M
        reservations:
          cpus: '0.05'
          memory: 32M
    depends_on:
      devilchain-node:
        condition: service_healthy
    networks: [devilnet]

  # ── MINER (optional, disable on low RAM) ───────────────────
  devilmine:
    <<: *common
    build:
      context: ../core
      dockerfile: Dockerfile.miner
    container_name: devilmine
    environment:
      - NODE_API=http://devilchain-node:8545
      - MINER_THREADS=1
      - MINER_ADDR=db1xmining_pool
      - RUST_LOG=warn
    profiles: ["mining"]   # only starts with: docker compose --profile mining up
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 128M
    depends_on:
      devilchain-node:
        condition: service_healthy
    networks: [devilnet]

  # ── REDIS (tiny, 10MB limit) ────────────────────────────────
  redis:
    <<: *common
    image: redis:7-alpine
    container_name: devil_redis
    command: redis-server --maxmemory 24mb --maxmemory-policy allkeys-lru --save "" --appendonly no
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 32M
    networks: [devilnet]

volumes:
  chain_data:  driver: local
  storage_data: driver: local

networks:
  devilnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
