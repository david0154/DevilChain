name: devilx_wallet
description: DevilX Wallet - Official DevilChain Web3 Wallet
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.3
  crypto: ^3.0.3
  flutter_secure_storage: ^9.0.0
  qr_flutter: ^4.1.0
  provider: ^6.1.2
  go_router: ^13.2.0
  flutter_svg: ^2.0.10
  web3dart: ^2.7.3
  bip39: ^1.0.6
  bip32: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
  fonts:
    - family: DevilFont
      fonts:
        - asset: assets/fonts/devil_regular.ttf
